            darkMode: 'class',

    <style>
        body {
            /* Let the background layer handle colors */
            background-color: transparent;
            color: #1f2937;
            /* light mode default text */
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none;
        }

        .dark body {
            color: white;
        }

        /* Ambient animated background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            transition: background 0.6s ease;
        }

        /* Glassmorphism Styles */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            transition: all 0.4s ease;
        }

        .dark .glass-panel {
            background: rgba(20, 20, 25, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.4s ease;
        }

        .dark .glass-nav {
            background: rgba(15, 15, 20, 0.7);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .dark .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .balance-gradient {
            background: linear-gradient(135deg, rgba(10, 132, 255, 0.9), rgba(0, 85, 179, 0.9));
            color: white;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }

        .spinner {
            border: 3px solid rgba(10, 132, 255, 0.2);
            border-radius: 50%;
            border-top: 3px solid #0A84FF;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .view-section {
            display: none;
            opacity: 0;
            transform: scale(0.97) translateY(10px);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .view-section.active {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .nav-item {
            transition: all 0.2s ease;
            color: #6b7280;
            /* light mode inactive */
        }

        .dark .nav-item {
            color: #9ca3af;
            /* dark mode inactive */
        }

        .nav-item.active {
            color: #0A84FF !important;
            transform: scale(1.05);
        }

        .nav-item.active>i {
            font-weight: bold;
        }

        /* Utility delay classes */
        .delay-100 {
            animation-delay: 100ms;
        }

        .delay-200 {
            animation-delay: 200ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* For animated blobs behind */
        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }
    </style>

    <!-- Logic Script -->
    <script>
        // --- Biometrics & Lock Screen Logic ---
        const authScreen = document.getElementById('auth-screen');
        const authButton = document.getElementById('auth-button');
        const setupAuthButton = document.getElementById('setup-auth-button');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const authSkipBtn = document.getElementById('auth-skip-btn');
        const authResetBtn = document.getElementById('auth-reset-btn');

        // Utility to base64url encode/decode
        const bufferToBase64url = (buffer) => {
            const bytes = new Uint8Array(buffer);
            let str = '';
            for (let char of bytes) str += String.fromCharCode(char);
            return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        };
        const base64urlToBuffer = (base64url) => {
            const padding = '='.repeat((4 - base64url.length % 4) % 4);
            const base64 = (base64url + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = atob(base64);
            const buffer = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) buffer[i] = rawData.charCodeAt(i);
            return buffer.buffer;
        };

        const isWebAuthnAvailable = window.PublicKeyCredential !== undefined &&
            (window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1');
        const storedCredential = localStorage.getItem('fintrack_biometric_id');

        function unlockApp() {
            authScreen.style.opacity = '0';
            setTimeout(() => {
                authScreen.style.display = 'none';
            }, 500);
        }

        if (isWebAuthnAvailable) {
            if (storedCredential) {
                // Return user
                authTitle.innerText = "FinTrack Locked";
                authSubtitle.innerText = "Use Face ID or Touch ID to unlock";
                authButton.classList.remove('hidden');
                authButton.classList.add('flex');
                authResetBtn.classList.remove('hidden');

                // Auto trigger auth after short delay
                setTimeout(authenticate, 400);
            } else {
                // Provide setup option
                authTitle.innerText = "Secure Dashboard";
                authSubtitle.innerText = "Add Face ID / Touch ID lock to protect your data.";
                setupAuthButton.classList.remove('hidden');
                setupAuthButton.classList.add('flex');
                authSkipBtn.classList.remove('hidden');
            }
        } else {
            // Not supported or not HTTPS, bypass lock
            unlockApp();
        }

        async function setupBiometrics() {
            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                const userId = new Uint8Array(16);
                window.crypto.getRandomValues(userId);

                const options = {
                    challenge,
                    rp: { name: "FinTrack Dashboard", id: window.location.hostname || "localhost" },
                    user: { id: userId, name: "admin_fintrack", displayName: "Lagee Garan" },
                    pubKeyCredParams: [
                        { alg: -7, type: "public-key" },  // ES256
                        { alg: -257, type: "public-key" } // RS256
                    ],
                    authenticatorSelection: {
                        authenticatorAttachment: "platform", // forces local biometric like FaceID
                        userVerification: "required"
                    },
                    timeout: 60000,
                    attestation: "none"
                };

                const credential = await navigator.credentials.create({ publicKey: options });
                localStorage.setItem('fintrack_biometric_id', bufferToBase64url(credential.rawId));

                // Success
                authTitle.innerText = "Setup Complete!";
                authSubtitle.innerText = "Your dashboard is now secured.";
                setupAuthButton.classList.add('hidden');
                authSkipBtn.classList.add('hidden');

                setTimeout(unlockApp, 1000);
            } catch (err) {
                console.error(err);
                alert("Setup Failed. Note: This feature requires a secure connection (HTTPS) and a supported device (e.g. iPhone with Face ID).");
            }
        }

        async function authenticate() {
            try {
                const storedCredId = localStorage.getItem('fintrack_biometric_id');
                if (!storedCredId) return;

                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);

                const options = {
                    challenge,
                    allowCredentials: [{
                        id: base64urlToBuffer(storedCredId),
                        type: 'public-key',
                        transports: ['internal'],
                    }],
                    userVerification: "required",
                    timeout: 60000,
                };

                await navigator.credentials.get({ publicKey: options });
                unlockApp();
            } catch (err) {
                console.error(err);
                authTitle.innerText = "Authentication Failed";
                authSubtitle.innerText = "Please try again to unlock.";
                authButton.querySelector('span').innerText = "Try Again";
            }
        }

        authButton.addEventListener('click', authenticate);
        setupAuthButton.addEventListener('click', setupBiometrics);
        authSkipBtn.addEventListener('click', unlockApp);
        authResetBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to reset the lock? You will need to set it up again.')) {
                localStorage.removeItem('fintrack_biometric_id');
                window.location.reload();
            }
        });

        // --- End Biometrics Logic ---


        document.getElementById('year').textContent = new Date().getFullYear();

        // Theme Toggle Logic
        const htmlObj = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');

        // Check LocalStorage or default to dark
        if (localStorage.getItem('mobile-theme') === 'light') {
            htmlObj.classList.remove('dark');
        } else {
            htmlObj.classList.add('dark'); // dark is default
        }

        themeBtn.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate(15);
            htmlObj.classList.toggle('dark');
            const isDark = htmlObj.classList.contains('dark');
            localStorage.setItem('mobile-theme', isDark ? 'dark' : 'light');
        });

        // Tab Switching Logic
        function switchTab(tabId) {
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
            });

            const targetView = document.getElementById('view-' + tabId);
            const targetTab = document.getElementById('tab-' + tabId);

            targetView.classList.add('active');
            targetTab.classList.add('active');

            if (navigator.vibrate) navigator.vibrate(10);
            document.querySelector('main').scrollTop = 0;
        }
    </script>

        };

        const timeAgo = (dateStr) => {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diffMs = now - date;
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            return date.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
        };

        // Render IOS-styled Rows inside frosted glass panel
        const renderList = (containerElement, txArray) => {
            containerElement.innerHTML = '';

            if (!txArray || txArray.length === 0) {
                containerElement.innerHTML = `<div class="py-12 text-center text-gray-500 text-[15px]">No transactions available.</div>`;
                return;
            }

            txArray.forEach(tx => {
                const isIncome = tx.type === 'income';
                const textColorLight = isIncome ? 'text-[#248A3D]' : 'text-[#B3261E]'; // light mode bold colors
                const textColorDark = isIncome ? 'dark:text-[#30D158]' : 'dark:text-[#FF453A]'; // dark mode glowing colors

                const iconBgLight = isIncome ? 'bg-[#30D158]/20' : 'bg-[#FF453A]/20';
                const iconBgDark = isIncome ? 'dark:bg-[#30D158]/20' : 'dark:bg-[#FF453A]/20';

                const iconColorLight = isIncome ? 'text-[#248A3D]' : 'text-[#B3261E]';
                const iconColorDark = isIncome ? 'dark:text-[#30D158]' : 'dark:text-[#FF453A]';

                const prefix = isIncome ? '+' : '-';

                containerElement.innerHTML += `
                    <li class="flex items-center justify-between p-4 active:bg-gray-100 dark:active:bg-gray-800 transition-colors cursor-pointer">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-11 h-11 rounded-2xl ${iconBgLight} ${iconBgDark} flex items-center justify-center shrink-0">
                                <i class="ph ${isIncome ? 'ph-arrow-down-left' : 'ph-arrow-up-right'} text-[22px] font-bold ${iconColorLight} ${iconColorDark}"></i>
                            </div>
                            <div class="flex flex-col overflow-hidden">
                                <span class="text-gray-900 dark:text-white font-semibold text-[16px] truncate leading-tight mb-0.5" style="max-width: 140px;">
                                    ${tx.description || 'System Update'}
                                </span>
                                <span class="text-[12px] font-medium text-gray-500 dark:text-gray-400 uppercase tracking-widest leading-tight">
                                    ${timeAgo(tx.date)}
                                </span>
                            </div>
                        </div>
                        <div class="flex flex-col items-end shrink-0 pl-2">
                            <span class="font-bold text-[16px] ${textColorLight} ${textColorDark} tracking-tight">
                                ${prefix}Rs ${formatCurrency(tx.amount)}
                            </span>
                        </div>
                    </li>
                `;
            });
        };

        const uiIncome = document.getElementById('ui-total-income');
        const uiExpense = document.getElementById('ui-total-expense');
        const uiBalance = document.getElementById('ui-net-balance');
        const loader = document.getElementById('loader');
        const uiLastUpdated = document.getElementById('ui-last-updated');

        const uiAdminList = document.getElementById('admin-tx-list');
        const uiBillingList = document.getElementById('billing-tx-list');

        let rawAdminTx = [];
        let rawBillingTx = [];

        const adminMonthFilter = document.getElementById('admin-month-filter');
        const billingMonthFilter = document.getElementById('billing-month-filter');

        const now = new Date();
        const currentMonthVal = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
        adminMonthFilter.value = currentMonthVal;
        billingMonthFilter.value = currentMonthVal;

        const renderFilteredList = (containerElement, txArray, monthVal) => {
            if (!txArray || txArray.length === 0) {
                renderList(containerElement, []);
                return;
            }
            if (!monthVal) {
                renderList(containerElement, txArray);
                return;
            }
            const filtered = txArray.filter(tx => {
                if (!tx.date) return false;
                return tx.date.startsWith(monthVal);
            });
            renderList(containerElement, filtered);
        };

        adminMonthFilter.addEventListener('change', () => {
            renderFilteredList(uiAdminList, rawAdminTx, adminMonthFilter.value);
        });

        billingMonthFilter.addEventListener('change', () => {
            renderFilteredList(uiBillingList, rawBillingTx, billingMonthFilter.value);
        });

        const syncRef = ref(db, 'fin_tracker');

        onValue(syncRef, (snapshot) => {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 300);

            const data = snapshot.val();

            if (data) {
                uiIncome.innerText = 'Rs. ' + formatCurrency(data.totalIncome || 0);
                uiExpense.innerText = 'Rs. ' + formatCurrency(data.totalExpense || 0);
                uiBalance.innerText = formatCurrency(data.netBalance || 0);

                if (data.lastUpdated) {
                    const time = new Date(data.lastUpdated);
                    uiLastUpdated.innerText = "Sync: " + time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }

                rawAdminTx = data.recentTransactions || [];
                rawBillingTx = data.recentBillingTx || [];

                // Render both lists based on current filter
                renderFilteredList(uiAdminList, rawAdminTx, adminMonthFilter.value);
                renderFilteredList(uiBillingList, rawBillingTx, billingMonthFilter.value);

            } else {
                uiAdminList.innerHTML = `<div class="py-12 text-center text-gray-500 text-[15px]">System not synced yet.</div>`;
                uiBillingList.innerHTML = `<div class="py-12 text-center text-gray-500 text-[15px]">System not synced yet.</div>`;
            }
        }, (error) => {
            console.error("Firebase Read Error", error);
            loader.innerHTML = `<div class="text-[#FF453A] font-bold text-[17px]">Network Error</div><p class="text-[15px] text-gray-600 dark:text-gray-400 mt-2">Check internet connection.</p>`;
        });
    </script>
</body>

</html>
